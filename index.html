<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site de Notícias</title>
    <link rel="stylesheet" href="./assets/css/cadastro/cadastro.css">
</head>

<body>
    <header>
        <div class="logo">M</div>
        <span class="titulo">Meu site de Notícias</span>
    </header>

    <main>
        <section class="container">
            <h1>Cadastre-se</h1>
            <form>
                <label>Nome</label>
                <input id="nome" type="text" placeholder="Informe seu nome">
                <label>E-mail</label>
                <input id="email" type="text" placeholder="Informe seu e-mail">
                <label>Senha</label>
                <input id="senha" type="password" placeholder="Informe sua senha">

                <button>Entrar</button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">ou</span>
                    <div class="divider-line"></div>
                </div>
                <p class="cadastro-link">Já tem uma conta? <a href="index.html">Login</a></p>
            </form>
        </section>
    </main>

    <footer>&copy; Meu Site de Notícias, ❤️</footer>
</body>

</html>
